//calculator for the percentage
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
<style>
    .container {
        width: 500px;
        margin: 0 auto;
        padding: 20px;
        border: 1px solid #ccc;
        border-radius: 5px;
        background-color: #f9f9f9;
        align-items: center;
    }

    .head {
        text-align: center;
    }

    input[type="number"] {
        width: 90%;
        padding: 10px 10px;
        margin-bottom: 10px 10px;
        border: 1px solid #ccc;
        border-radius: 5px;
    }

    button {
        width: 100%;
        padding: 10px 10px;
        background-color: #4CAF50;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }

    button:hover {
        background-color: #45a049;
    }

    p {
        text-align: center;
        font-size: 18px;
    }
</style>
</head>
<body style="background-color: Aqua;">
    <div class="container">
        <h2 class="head" >Percentage Calculator</h2>
        <input type="number" id="num1" placeholder="Enter the number" required><br><br>
        <input type="number" id="num2" placeholder="Enter the percentage" required><br><br>
        <button onclick="calculatePercentage()">Calculate</button><br><br>
        <button onclick="clearFields()">Clear</button><br><br>
        <p id="result"></p>
    </div>
    <script>
        function calculatePercentage() {
            var num1 = parseFloat(document.getElementById("num1").value);
            var num2 = parseFloat(document.getElementById("num2").value);
            if (isNaN(num1) || isNaN(num2)) {
                document.getElementById("result").innerHTML = "Please enter valid numbers.";
                return;
            }
            var result = (num1 * num2) / 100;
            document.getElementById("result").innerHTML = "Percentage: " + result;
        }

        function clearFields() {
            document.getElementById("num1").value = "";
            document.getElementById("num2").value = "";
            document.getElementById("result").innerHTML = "";
        }
    </script>


</body>
</html>
